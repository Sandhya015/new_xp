# XpertIntern API — AWS Lambda + API Gateway (serverless, pay-per-request, no always-on)
# Deploy: from backend/ run  npx serverless deploy --stage dev|staging|production
service: xpertintern-api

provider:
  name: aws
  runtime: python3.11
  region: ap-south-1
  stage: ${opt:stage, 'dev'}
  environment:
    FLASK_ENV: ${self:provider.stage}
    MONGODB_URI: ${env:MONGODB_URI, ''}
    SECRET_KEY: ${env:SECRET_KEY, ''}
    JWT_SECRET_KEY: ${env:JWT_SECRET_KEY, ''}
    CORS_ORIGINS: ${env:CORS_ORIGINS, 'http://localhost:5173,http://127.0.0.1:5173,https://www.xpertintern.com,https://xpertintern.com'}
  # Optional: restrict to your VPC or keep default (no VPC = simpler, MongoDB Atlas works)
  # vpc: ...

plugins:
  - serverless-wsgi
  - serverless-python-requirements

custom:
  wsgi:
    app: app_wsgi.app
    packRequirements: false
  pythonRequirements:
    slim: true
    strip: true
    layer: true
    dockerizePip: true
    noDeploy:
      - pytest
      - pytest-cov

functions:
  api:
    handler: wsgi_handler.handler
    timeout: 30
    memorySize: 256
    package:
      individually: true
      # Include only app code and WSGI handler; deps come from the requirements layer
      patterns:
        - '!venv/**'
        - '!.venv/**'
        - '!.venv_bak/**'
        - '!venv_bak/**'
        - '!.git/**'
        - '!node_modules/**'
        - '!__pycache__/**'
        - '!*.pyc'
        - '!.env'
        - '!.env.*'
        - '!**/__pycache__/**'
        - '!*.md'
        - '!package-lock.json'
        - 'app/**'
        - 'app_wsgi.py'
        - 'wsgi_handler.py'
        - 'serverless_wsgi.py'
        - '.serverless-wsgi'
    events:
      - http:
          path: /
          method: ANY
      - http:
          path: /{proxy+}
          method: ANY

# No scheduled events / cron — nothing runs in a loop; Lambda only on request
