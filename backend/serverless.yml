# XpertIntern API — AWS Lambda + API Gateway (serverless, pay-per-request, no always-on)
# Deploy: from backend/ run  npx serverless deploy --stage dev|staging|production
# Loads backend/.env so RAZORPAY_* / MONGODB_URI / secrets are not wiped as empty on deploy.
service: xpertintern-api
useDotenv: true

provider:
  name: aws
  runtime: python3.11
  region: ap-south-1
  stage: ${opt:stage, 'dev'}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - ses:SendEmail
            - ses:SendRawEmail
          Resource: "*"
  environment:
    FLASK_ENV: ${self:provider.stage}
    MONGODB_URI: ${env:MONGODB_URI, ''}
    SECRET_KEY: ${env:SECRET_KEY, ''}
    JWT_SECRET_KEY: ${env:JWT_SECRET_KEY, ''}
    # Strip /dev (stage) from path so Flask sees /api/... not /dev/api/...
    API_GATEWAY_BASE_PATH: ${self:provider.stage}
    # Comma-separated origins; include your frontend URL for CORS
    CORS_ORIGINS: ${env:CORS_ORIGINS, 'http://localhost:5173,http://127.0.0.1:5173,https://www.xpertintern.com,https://xpertintern.com'}
    # Razorpay — export before deploy or set in Lambda Console (never commit secrets)
    RAZORPAY_KEY_ID: ${env:RAZORPAY_KEY_ID, ''}
    RAZORPAY_KEY_SECRET: ${env:RAZORPAY_KEY_SECRET, ''}
    # SMTP (Zoho) — set in Lambda env / SSM; never commit secrets
    SMTP_HOST: ${env:SMTP_HOST, ''}
    SMTP_PORT: ${env:SMTP_PORT, '587'}
    SMTP_USER: ${env:SMTP_USER, ''}
    SMTP_PASSWORD: ${env:SMTP_PASSWORD, ''}
    MAIL_FROM: ${env:MAIL_FROM, 'admin@xpertintern.com'}
    MAIL_FROM_NAME: ${env:MAIL_FROM_NAME, 'XpertIntern'}
    MAIL_REPLY_TO: ${env:MAIL_REPLY_TO, 'contact@xpertintern.com'}
    # Set EMAIL_TRANSPORT=ses and SES_FROM_EMAIL to verified SES identity (same region as Lambda).
    EMAIL_TRANSPORT: ${env:EMAIL_TRANSPORT, 'smtp'}
    SES_FROM_EMAIL: ${env:SES_FROM_EMAIL, ''}
    SES_REGION: ${env:SES_REGION, 'ap-south-1'}
  # Optional: restrict to your VPC or keep default (no VPC = simpler, MongoDB Atlas works)
  # vpc: ...

plugins:
  - serverless-wsgi
  - serverless-python-requirements

custom:
  wsgi:
    app: app_wsgi.app
    packRequirements: false
  pythonRequirements:
    slim: true
    strip: true
    layer: true
    dockerizePip: false
    pythonBin: python3
    noDeploy:
      - pytest
      - pytest-cov
      - boto3
      - botocore
      - s3transfer

functions:
  api:
    handler: safe_handler.handler
    timeout: 30
    memorySize: 256
    layers:
      - Ref: PythonRequirementsLambdaLayer
    package:
      individually: true
      patterns:
        - '!venv/**'
        - '!.venv/**'
        - '!.venv_bak/**'
        - '!venv_bak/**'
        - '!.git/**'
        - '!node_modules/**'
        - '!__pycache__/**'
        - '!*.pyc'
        - '!.env'
        - '!.env.*'
        - '!**/__pycache__/**'
        - '!*.md'
        - '!package-lock.json'
        - 'app/**'
        - 'app_wsgi.py'
        - 'safe_handler.py'
        - 'wsgi_handler.py'
        - 'serverless_wsgi.py'
        - '.serverless-wsgi'
    events:
      - http:
          path: /
          method: ANY
          cors:
            # Comma-separated `origin:` is invalid for multiple sites — use `origins` (Serverless matches request Origin).
            origins:
              - http://localhost:5173
              - http://127.0.0.1:5173
              - https://www.xpertintern.com
              - https://xpertintern.com
              - https://*.vercel.app
              - ${env:FRONTEND_ORIGIN, 'https://www.xpertintern.com'}
            headers:
              - Content-Type
              - Authorization
            allowCredentials: true
            maxAge: 86400
      - http:
          path: /{proxy+}
          method: ANY
          cors:
            origins:
              - http://localhost:5173
              - http://127.0.0.1:5173
              - https://www.xpertintern.com
              - https://xpertintern.com
              - https://*.vercel.app
              - ${env:FRONTEND_ORIGIN, 'https://www.xpertintern.com'}
            headers:
              - Content-Type
              - Authorization
            allowCredentials: true
            maxAge: 86400

# Add CORS headers to error responses (4XX/5XX) so browser doesn't block on error
resources:
  Resources:
    GatewayResponseDefault4XX:
      Type: AWS::ApiGateway::GatewayResponse
      Properties:
        ResponseParameters:
          gatewayresponse.header.Access-Control-Allow-Origin: "'https://www.xpertintern.com'"
          gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"
          gatewayresponse.header.Access-Control-Allow-Credentials: "'true'"
        ResponseType: DEFAULT_4XX
        RestApiId:
          Ref: ApiGatewayRestApi
    GatewayResponseDefault5XX:
      Type: AWS::ApiGateway::GatewayResponse
      Properties:
        ResponseParameters:
          gatewayresponse.header.Access-Control-Allow-Origin: "'https://www.xpertintern.com'"
          gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"
          gatewayresponse.header.Access-Control-Allow-Credentials: "'true'"
        ResponseType: DEFAULT_5XX
        RestApiId:
          Ref: ApiGatewayRestApi
